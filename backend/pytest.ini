[pytest]
testpaths = tests
# pythonpath intentionally lists only the backend root. Dependencies come
# from the active virtualenv (.venv). The repo's `../.vendor_py` tree is a
# Windows-vendored dependency set used as an alternate interpreter on Windows
# (see docs/local-environment-setup.md); injecting it here shadowed the venv's
# pydantic_core with a platform-incompatible binary on non-Windows hosts. Run
# pytest from the active venv — no `-o "pythonpath=."` override is needed.
pythonpath =
    .
addopts = -ra --strict-markers
markers =
    db: tests that require the database harness
    slow: slow or integration-style tests
